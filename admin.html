<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Xiao Hui</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; color: #000; font-family: 'Syne', sans-serif; font-size: 13px; }

/* Login screen */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1rem;
}
.login-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; margin-bottom: 1rem; }
.login-input {
  width: 280px;
  border: 1px solid #000;
  padding: 0.75rem 1rem;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  outline: none;
  border-radius: 0;
}
.login-btn {
  width: 280px;
  background: #000;
  color: #fff;
  border: none;
  padding: 0.75rem 1rem;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
}
.login-btn:hover { background: #333; }
.login-error { font-size: 11px; color: #c00; letter-spacing: 0.1em; text-transform: uppercase; }

/* Admin panel */
.admin-wrap { display: none; }
nav { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; height: 48px; border-bottom: 1px solid #000; background: #fff; z-index: 99; }
.nav-logo { font-weight: 800; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: #000; }
.nav-right { display: flex; gap: 2rem; align-items: center; }
.nav-link { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #000; text-decoration: none; font-weight: 400; cursor: pointer; background: none; border: none; font-family: 'Syne', sans-serif; }
.nav-link:hover { opacity: 0.4; }

.admin-content { margin-top: 48px; display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 48px); }

.write-panel { border-right: 1px solid #000; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
.write-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; }
.write-input {
  width: 100%;
  border: 1px solid #eee;
  padding: 0.75rem 1rem;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  outline: none;
  border-radius: 0;
}
.write-input:focus { border-color: #000; }
.write-textarea {
  width: 100%;
  border: 1px solid #eee;
  padding: 0.75rem 1rem;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  outline: none;
  border-radius: 0;
  resize: vertical;
  min-height: 400px;
  line-height: 2;
}
.write-textarea:focus { border-color: #000; }
.write-btn {
  background: #000;
  color: #fff;
  border: none;
  padding: 0.75rem 1.5rem;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  align-self: flex-start;
}
.write-btn:hover { background: #333; }
.write-status { font-size: 11px; color: #aaa; letter-spacing: 0.1em; }

.entries-panel { padding: 2rem; overflow-y: auto; }
.entries-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; margin-bottom: 1.5rem; }
.entry-item { padding: 1.5rem 0; border-bottom: 1px solid #eee; position: relative; }
.entry-item:last-child { border-bottom: none; }
.entry-item-date { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #bbb; margin-bottom: 0.3rem; }
.entry-item-title { font-size: 16px; font-weight: 700; margin-bottom: 0.5rem; }
.entry-item-preview { font-size: 12px; color: #777; line-height: 1.7; white-space: pre-wrap; }
.entry-delete {
  position: absolute;
  top: 1.5rem;
  right: 0;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #ccc;
  cursor: pointer;
  background: none;
  border: none;
  font-family: 'Syne', sans-serif;
}
.entry-delete:hover { color: #c00; }
.empty { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #ccc; padding: 2rem 0; }

@media (max-width: 600px) {
  .admin-content { grid-template-columns: 1fr; }
  .write-panel { border-right: none; border-bottom: 1px solid #000; }
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-title">Admin Access</div>
  <input class="login-input" type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="login-btn" onclick="checkPw()">Enter</button>
  <div class="login-error" id="loginError"></div>
</div>

<!-- Admin panel -->
<div class="admin-wrap" id="adminWrap">
  <nav>
    <div class="nav-logo">Admin</div>
    <div class="nav-right">
      <a class="nav-link" href="journal.html" target="_blank">View Journal</a>
      <button class="nav-link" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="admin-content">
    <div class="write-panel">
      <div class="write-label">New Entry</div>
      <div>
        <div class="write-label" style="margin-bottom:0.4rem;">Title (optional)</div>
        <input class="write-input" type="text" id="entryTitle" placeholder="Title...">
      </div>
      <div>
        <div class="write-label" style="margin-bottom:0.4rem;">Content</div>
        <textarea class="write-textarea" id="entryContent" placeholder="Write something..."></textarea>
      </div>
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="write-btn" onclick="publish()">Publish</button>
        <div class="write-status" id="writeStatus"></div>
      </div>
    </div>

    <div class="entries-panel">
      <div class="entries-label">All Entries</div>
      <div id="entriesList"><div class="empty">Loading...</div></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://locehayfyfwpdyrabiqm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2VoYXlmeWZ3cGR5cmFiaXFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTQzMTcsImV4cCI6MjA5Mzk5MDMxN30.RKAUOEWE5xFl1z57Q0QN9_sIiirTGsSMVLmgygxUL4M';
const HEADERS={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
const PASSWORD='Xhmolly.15';

function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === PASSWORD) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    loadEntries();
  } else {
    document.getElementById('loginError').textContent = 'Wrong password';
  }
}

function logout() {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

async function publish() {
  const title = document.getElementById('entryTitle').value.trim();
  const content = document.getElementById('entryContent').value.trim();
  const status = document.getElementById('writeStatus');
  if (!content) { status.textContent = 'Content cannot be empty.'; return; }
  status.textContent = 'Publishing...';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/journal`, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify({ title, content })
    });
    if (res.ok) {
      status.textContent = 'Published!';
      document.getElementById('entryTitle').value = '';
      document.getElementById('entryContent').value = '';
      loadEntries();
      setTimeout(() => status.textContent = '', 3000);
    } else {
      status.textContent = 'Failed to publish.';
    }
  } catch(e) {
    status.textContent = 'Error.';
  }
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/journal?id=eq.${id}`, {
    method: 'DELETE',
    headers: HEADERS
  });
  loadEntries();
}

async function loadEntries() {
  const list = document.getElementById('entriesList');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/journal?select=*&order=created_at.desc`, { headers: HEADERS });
    const entries = await res.json();
    if (!entries.length) { list.innerHTML = '<div class="empty">No entries yet.</div>'; return; }
    list.innerHTML = entries.map(e => `
      <div class="entry-item">
        <div class="entry-item-date">${new Date(e.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
        ${e.title ? `<div class="entry-item-title">${e.title}</div>` : ''}
        <div class="entry-item-preview">${e.content.slice(0,200)}${e.content.length>200?'...':''}</div>
        <button class="entry-delete" onclick="deleteEntry(${e.id})">Delete</button>
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty">Failed to load.</div>';
  }
}
</script>
</body>
</html>
