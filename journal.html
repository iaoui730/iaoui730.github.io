<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal — Xiao Hui</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; color: #000; font-family: 'Syne', sans-serif; font-size: 13px; }
nav { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; height: 48px; border-bottom: 1px solid #000; background: #fff; z-index: 99; }
.nav-logo { font-weight: 800; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; text-decoration: none; color: #000; }
.nav-right { display: flex; gap: 2rem; list-style: none; }
.nav-right a { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #000; text-decoration: none; font-weight: 400; }
.nav-right a:hover { opacity: 0.4; }

.page { margin-top: 48px; }
.page-header { border-bottom: 1px solid #000; padding: 1rem 2rem; display: flex; justify-content: space-between; }
.page-header-title { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 400; }

.entries { max-width: 680px; margin: 0 auto; padding: 0 2rem; }
.entry { padding: 3rem 0; border-bottom: 1px solid #eee; }
.entry:last-child { border-bottom: none; }
.entry-date { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; margin-bottom: 1rem; }
.entry-title { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 1.5rem; line-height: 1.2; }
.entry-content { font-size: 14px; line-height: 2; color: #444; white-space: pre-wrap; margin-bottom: 2.5rem; }

/* Comments */
.comments-section { border-top: 1px solid #eee; padding-top: 2rem; }
.comments-title { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; margin-bottom: 1.5rem; }
.comment-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2rem; }
.comment-item { padding: 1rem; background: #fafafa; }
.comment-meta { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin-bottom: 0.4rem; display: flex; gap: 1rem; }
.comment-region { color: #888; }
.comment-text { font-size: 13px; line-height: 1.8; color: #333; }

/* Comment form */
.comment-form { display: flex; flex-direction: column; gap: 0.75rem; }
.comment-form-row { display: flex; gap: 0.75rem; }
.comment-input {
  flex: 1;
  border: 1px solid #eee;
  padding: 0.75rem 1rem;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  outline: none;
  border-radius: 0;
  background: #fff;
}
.comment-input:focus { border-color: #000; }
.comment-select {
  border: 1px solid #eee;
  padding: 0.75rem 1rem;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  outline: none;
  border-radius: 0;
  background: #fff;
  cursor: pointer;
  color: #555;
}
.comment-select:focus { border-color: #000; }
.comment-textarea {
  width: 100%;
  border: 1px solid #eee;
  padding: 0.75rem 1rem;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  outline: none;
  border-radius: 0;
  resize: vertical;
  min-height: 100px;
  line-height: 1.8;
}
.comment-textarea:focus { border-color: #000; }
.comment-btn {
  align-self: flex-start;
  background: #000;
  color: #fff;
  border: none;
  padding: 0.6rem 1.2rem;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
}
.comment-btn:hover { background: #333; }
.comment-status { font-size: 11px; color: #aaa; }
.no-comments { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #ccc; margin-bottom: 1.5rem; }

.empty { text-align: center; padding: 6rem 2rem; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #ccc; }
footer { padding: 1rem 2rem; border-top: 1px solid #000; display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #bbb; margin-top: 2rem; }

@media (max-width: 600px) {
  .comment-form-row { flex-direction: column; }
  .entries { padding: 0 1rem; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html"><span style="font-weight:800">(</span>X<span style="font-weight:800">)</span>IAO <span style="font-weight:800">(</span>H<span style="font-weight:800">)</span>UI</a>
  <ul class="nav-right">
    <li><a href="index.html#work">Work</a></li>
    <li><a href="index.html#about">About</a></li>
    <li><a href="journal.html">Journal</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-header-title">Journal</div>
  </div>
  <div class="entries" id="entries">
    <div class="empty">Loading...</div>
  </div>
</div>

<footer>
  <span>© 2025 (X)IAO (H)UI</span>
  <span>Tokyo</span>
</footer>

<script>
const SUPABASE_URL='https://locehayfyfwpdyrabiqm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2VoYXlmeWZ3cGR5cmFiaXFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTQzMTcsImV4cCI6MjA5Mzk5MDMxN30.RKAUOEWE5xFl1z57Q0QN9_sIiirTGsSMVLmgygxUL4M';
const HEADERS={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};

const REGIONS=[
  {id:'asia-pacific',name:'Asia Pacific'},
  {id:'europe',name:'Europe'},
  {id:'north-america',name:'North America'},
  {id:'latin-america',name:'Latin America'},
  {id:'mea',name:'Middle East & Africa'},
  {id:'other',name:'Other'},
];

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff/60000);
  const hours = Math.floor(mins/60);
  const days = Math.floor(hours/24);
  if (days > 0) return `${days}d ago`;
  if (hours > 0) return `${hours}h ago`;
  if (mins > 0) return `${mins}m ago`;
  return 'Just now';
}

async function loadComments(journalId, container) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/comments?journal_id=eq.${journalId}&order=created_at.asc`, {headers: HEADERS});
  const comments = await res.json();
  const list = container.querySelector('.comment-list');
  if (!comments.length) {
    list.innerHTML = '<div class="no-comments">No comments yet. Be the first.</div>';
    return;
  }
  list.innerHTML = comments.map(c => `
    <div class="comment-item">
      <div class="comment-meta">
        <span>${timeAgo(c.created_at)}</span>
        ${c.region ? `<span class="comment-region">${REGIONS.find(r=>r.id===c.region)?.name || c.region}</span>` : ''}
      </div>
      <div class="comment-text">${c.content.replace(/</g,'&lt;')}</div>
    </div>
  `).join('');
}

async function submitComment(journalId, container) {
  const text = container.querySelector('.comment-textarea').value.trim();
  const region = container.querySelector('.comment-select').value;
  const status = container.querySelector('.comment-status');
  if (!text) { status.textContent = 'Please write something.'; return; }
  status.textContent = 'Posting...';
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/comments`, {
      method: 'POST',
      headers: {...HEADERS, 'Prefer': 'return=minimal'},
      body: JSON.stringify({journal_id: journalId, content: text, region: region || null})
    });
    if (res.ok) {
      container.querySelector('.comment-textarea').value = '';
      status.textContent = '';
      loadComments(journalId, container);
    } else {
      status.textContent = 'Failed to post.';
    }
  } catch(e) {
    status.textContent = 'Error.';
  }
}

async function loadEntries() {
  const container = document.getElementById('entries');
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/journal?select=*&order=created_at.desc`, {headers: HEADERS});
    const entries = await res.json();
    if (!entries.length) {
      container.innerHTML = '<div class="empty">Nothing here yet.</div>';
      return;
    }
    container.innerHTML = '';
    entries.forEach(e => {
      const div = document.createElement('div');
      div.className = 'entry';
      div.innerHTML = `
        <div class="entry-date">${new Date(e.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
        ${e.title ? `<div class="entry-title">${e.title}</div>` : ''}
        <div class="entry-content">${e.content.replace(/</g,'&lt;')}</div>
        <div class="comments-section">
          <div class="comments-title">Comments</div>
          <div class="comment-list"><div class="no-comments">Loading...</div></div>
          <div class="comment-form">
            <textarea class="comment-textarea" placeholder="Leave a comment..."></textarea>
            <div class="comment-form-row">
              <select class="comment-select">
                <option value="">Where are you from?</option>
                ${REGIONS.map(r=>`<option value="${r.id}">${r.name}</option>`).join('')}
              </select>
              <button class="comment-btn" onclick="submitComment(${e.id}, this.closest('.comments-section'))">Post</button>
            </div>
            <div class="comment-status"></div>
          </div>
        </div>
      `;
      container.appendChild(div);
      loadComments(e.id, div.querySelector('.comments-section'));
    });
  } catch(err) {
    container.innerHTML = '<div class="empty">Failed to load.</div>';
  }
}

loadEntries();
</script>
</body>
</html>
