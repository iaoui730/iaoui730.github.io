<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Xiao Hui</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; color: #000; font-family: 'Syne', sans-serif; font-size: 13px; }

.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1rem; }
.login-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; margin-bottom: 1rem; }
.login-input { width: 280px; border: 1px solid #000; padding: 0.75rem 1rem; font-family: 'Syne', sans-serif; font-size: 13px; outline: none; border-radius: 0; }
.login-btn { width: 280px; background: #000; color: #fff; border: none; padding: 0.75rem 1rem; font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; }
.login-btn:hover { background: #333; }
.login-error { font-size: 11px; color: #c00; letter-spacing: 0.1em; text-transform: uppercase; }

.admin-wrap { display: none; }
nav { position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 2rem; height: 48px; border-bottom: 1px solid #000; background: #fff; z-index: 99; }
.nav-logo { font-weight: 800; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; color: #000; }
.nav-right { display: flex; gap: 2rem; align-items: center; }
.nav-btn { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #000; text-decoration: none; font-weight: 400; cursor: pointer; background: none; border: none; font-family: 'Syne', sans-serif; }
.nav-btn:hover { opacity: 0.4; }

.tabs { margin-top: 48px; display: flex; border-bottom: 1px solid #000; }
.tab { padding: 1rem 2rem; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; border-right: 1px solid #eee; transition: background 0.15s; }
.tab:hover { background: #f8f8f8; }
.tab.active { background: #f8f8f8; font-weight: 700; }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* Write panel */
.write-panel { max-width: 680px; margin: 0 auto; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
.write-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #aaa; margin-bottom: 0.4rem; }
.write-input { width: 100%; border: 1px solid #eee; padding: 0.75rem 1rem; font-family: 'Syne', sans-serif; font-size: 14px; outline: none; }
.write-input:focus { border-color: #000; }
.write-textarea { width: 100%; border: 1px solid #eee; padding: 0.75rem 1rem; font-family: 'Syne', sans-serif; font-size: 14px; outline: none; resize: vertical; min-height: 300px; line-height: 2; }
.write-textarea:focus { border-color: #000; }
.write-btn { background: #000; color: #fff; border: none; padding: 0.75rem 1.5rem; font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; }
.write-btn:hover { background: #333; }
.write-status { font-size: 11px; color: #aaa; }

/* Entries list */
.list-panel { padding: 2rem; }
.entry-item { padding: 1.5rem 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; }
.entry-item:last-child { border-bottom: none; }
.entry-item-info { flex: 1; }
.entry-item-date { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #bbb; margin-bottom: 0.3rem; }
.entry-item-title { font-size: 16px; font-weight: 700; margin-bottom: 0.4rem; }
.entry-item-preview { font-size: 12px; color: #777; line-height: 1.7; }
.entry-item-actions { display: flex; gap: 1rem; flex-shrink: 0; }
.action-btn { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; background: none; border: none; font-family: 'Syne', sans-serif; color: #aaa; }
.action-btn:hover { color: #c00; }

/* Comments panel */
.comments-panel { padding: 2rem; }
.comment-item { padding: 1.2rem 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; }
.comment-item:last-child { border-bottom: none; }
.comment-info { flex: 1; }
.comment-meta { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb; margin-bottom: 0.3rem; display: flex; gap: 1rem; }
.comment-text { font-size: 13px; color: #333; line-height: 1.7; }
.comment-journal { font-size: 10px; color: #aaa; margin-top: 0.3rem; }

.empty { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #ccc; padding: 2rem 0; }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-title">Admin Access</div>
  <input class="login-input" type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
  <button class="login-btn" onclick="checkPw()">Enter</button>
  <div class="login-error" id="loginError"></div>
</div>

<div class="admin-wrap" id="adminWrap">
  <nav>
    <div class="nav-logo">Admin</div>
    <div class="nav-right">
      <a class="nav-btn" href="journal.html" target="_blank">View Journal</a>
      <button class="nav-btn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('write')">Write</div>
    <div class="tab" onclick="switchTab('entries')">Entries</div>
    <div class="tab" onclick="switchTab('comments')">Comments</div>
  </div>

  <div class="tab-content active" id="tab-write">
    <div class="write-panel">
      <div>
        <div class="write-label">Title (optional)</div>
        <input class="write-input" type="text" id="entryTitle" placeholder="Title...">
      </div>
      <div>
        <div class="write-label">Content</div>
        <textarea class="write-textarea" id="entryContent" placeholder="Write something..."></textarea>
      </div>
      <div style="display:flex;align-items:center;gap:1rem;">
        <button class="write-btn" onclick="publish()">Publish</button>
        <div class="write-status" id="writeStatus"></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-entries">
    <div class="list-panel" id="entriesList"><div class="empty">Loading...</div></div>
  </div>

  <div class="tab-content" id="tab-comments">
    <div class="comments-panel" id="commentsList"><div class="empty">Loading...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://locehayfyfwpdyrabiqm.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxvY2VoYXlmeWZ3cGR5cmFiaXFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTQzMTcsImV4cCI6MjA5Mzk5MDMxN30.RKAUOEWE5xFl1z57Q0QN9_sIiirTGsSMVLmgygxUL4M';
const HEADERS={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
const PASSWORD='Xhmolly.15';

const REGIONS={
  'asia-pacific':'Asia Pacific','europe':'Europe','north-america':'North America',
  'latin-america':'Latin America','mea':'Middle East & Africa','other':'Other'
};

function checkPw() {
  if (document.getElementById('pwInput').value === PASSWORD) {
    document.getElementById('loginWrap').style.display='none';
    document.getElementById('adminWrap').style.display='block';
    loadEntries(); loadComments();
  } else {
    document.getElementById('loginError').textContent='Wrong password';
  }
}

function logout() {
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('adminWrap').style.display='none';
  document.getElementById('pwInput').value='';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['write','entries','comments'][i]===name));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

async function publish() {
  const title=document.getElementById('entryTitle').value.trim();
  const content=document.getElementById('entryContent').value.trim();
  const status=document.getElementById('writeStatus');
  if (!content){status.textContent='Content cannot be empty.';return;}
  status.textContent='Publishing...';
  try {
    const res=await fetch(`${SUPABASE_URL}/rest/v1/journal`,{
      method:'POST',headers:{...HEADERS,'Prefer':'return=minimal'},
      body:JSON.stringify({title,content})
    });
    if (res.ok){
      status.textContent='Published!';
      document.getElementById('entryTitle').value='';
      document.getElementById('entryContent').value='';
      loadEntries();
      setTimeout(()=>status.textContent='',3000);
    } else { status.textContent='Failed.'; }
  } catch(e){ status.textContent='Error.'; }
}

async function deleteEntry(id) {
  if (!confirm('Delete this entry and all its comments?')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/journal?id=eq.${id}`,{method:'DELETE',headers:HEADERS});
  loadEntries(); loadComments();
}

async function deleteComment(id) {
  if (!confirm('Delete this comment?')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/comments?id=eq.${id}`,{method:'DELETE',headers:HEADERS});
  loadComments();
}

async function loadEntries() {
  const list=document.getElementById('entriesList');
  try {
    const res=await fetch(`${SUPABASE_URL}/rest/v1/journal?select=*&order=created_at.desc`,{headers:HEADERS});
    const entries=await res.json();
    if (!entries.length){list.innerHTML='<div class="empty">No entries yet.</div>';return;}
    list.innerHTML=entries.map(e=>`
      <div class="entry-item">
        <div class="entry-item-info">
          <div class="entry-item-date">${new Date(e.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</div>
          ${e.title?`<div class="entry-item-title">${e.title}</div>`:''}
          <div class="entry-item-preview">${e.content.slice(0,120)}${e.content.length>120?'...':''}</div>
        </div>
        <div class="entry-item-actions">
          <button class="action-btn" onclick="deleteEntry(${e.id})">Delete</button>
        </div>
      </div>
    `).join('');
  } catch(e){ list.innerHTML='<div class="empty">Failed to load.</div>'; }
}

async function loadComments() {
  const list=document.getElementById('commentsList');
  try {
    const res=await fetch(`${SUPABASE_URL}/rest/v1/comments?select=*,journal(title)&order=created_at.desc`,{headers:HEADERS});
    const comments=await res.json();
    if (!comments.length){list.innerHTML='<div class="empty">No comments yet.</div>';return;}
    list.innerHTML=comments.map(c=>`
      <div class="comment-item">
        <div class="comment-info">
          <div class="comment-meta">
            <span>${new Date(c.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}</span>
            ${c.region?`<span>${REGIONS[c.region]||c.region}</span>`:''}
          </div>
          <div class="comment-text">${c.content.replace(/</g,'&lt;')}</div>
          ${c.journal?.title?`<div class="comment-journal">On: ${c.journal.title}</div>`:''}
        </div>
        <button class="action-btn" onclick="deleteComment(${c.id})">Delete</button>
      </div>
    `).join('');
  } catch(e){ list.innerHTML='<div class="empty">Failed to load.</div>'; }
}
</script>
</body>
</html>
